<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finland Hypermarket Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6f8;--panel:#fff;--card:#f0f1f4;--t1:#111;--t2:#555;--t3:#999;--brd:#ddd;--radius:10px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:380px;min-width:380px;background:var(--panel);border-right:1px solid var(--brd);display:flex;flex-direction:column;z-index:1000}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--brd)}
.sb-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.sb-count{font-size:12px;color:var(--t2);margin-top:4px}
.filters{padding:10px 20px;border-bottom:1px solid var(--brd);display:flex;flex-wrap:wrap;gap:5px}
.chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--brd);background:#fff;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;user-select:none}
.chip.on{color:#fff;border-color:transparent}
.chip-dot{width:7px;height:7px;border-radius:50%}
.chip-n{font-size:10px;opacity:.7;font-weight:500}
.search{padding:10px 20px;border-bottom:1px solid var(--brd)}
.search input{width:100%;padding:8px 12px;border:1.5px solid var(--brd);border-radius:var(--radius);font-size:13px;outline:none;background:var(--bg);font-family:inherit}
.search input:focus{border-color:#FF6600}
.list{flex:1;overflow-y:auto;padding:4px 8px}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.row{padding:8px 10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s}
.row:hover{background:var(--card)}
.row.act{background:var(--card);box-shadow:inset 3px 0 0 var(--rc)}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta{font-size:10px;color:var(--t2);margin-top:2px;display:flex;gap:6px;align-items:center}
.row-tag{font-size:8px;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:3px;color:#fff}
.row-hrs{font-size:10px;color:var(--t3);background:var(--bg);padding:1px 5px;border-radius:3px}
.row-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:3px;border-radius:4px;opacity:0;transition:.2s}
.row:hover .row-btn{opacity:1}
.row-btn:hover{color:#FF6600;background:rgba(255,102,0,.1)}
.row-btn.del:hover{color:#e33;background:rgba(255,0,0,.08)}

/* ADD PANEL */
.add-panel{border-top:1px solid var(--brd);padding:12px 20px;background:var(--card)}
.add-btn{width:100%;padding:9px;background:#FF6600;border:none;border-radius:var(--radius);color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.add-btn:hover{background:#e55a00}
.form{display:none}.form.open{display:block}
.tabs{display:flex;gap:4px;margin-bottom:10px}
.tab{flex:1;padding:7px;border:1.5px solid var(--brd);border-radius:7px;background:#fff;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit}
.tab.on{border-color:#FF6600;color:var(--t1);background:#fff5ee}
.fg{margin-bottom:7px}
.fl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;display:block}
.fi{width:100%;padding:7px 9px;border:1.5px solid var(--brd);border-radius:7px;font-size:12px;outline:none;font-family:inherit;background:#fff}
.fi:focus{border-color:#FF6600}
textarea.fi{resize:vertical}
select.fi{appearance:none;cursor:pointer}
.fg2{display:flex;gap:6px}.fg2 .fg{flex:1}
.colors{display:flex;gap:5px;flex-wrap:wrap}
.csw{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer}
.csw:hover{transform:scale(1.1)}.csw.on{border-color:var(--t1);box-shadow:0 0 6px rgba(0,0,0,.2)}
.fa{display:flex;gap:6px;margin-top:8px}
.fb{flex:1;padding:7px;border:none;border-radius:7px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit}
.fb-p{background:#FF6600;color:#fff}.fb-p:hover{background:#e55a00}
.fb-p.edit-mode{background:#0066CC}.fb-p.edit-mode:hover{background:#0055aa}
.fb-s{background:var(--brd);color:var(--t2)}.fb-s:hover{background:#ccc}
.hint{font-size:10px;color:var(--t3);text-align:center;margin-top:5px}
.note{font-size:10px;color:var(--t2);margin-bottom:8px}

/* MAP */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important}
.pop h3{font-size:13px;font-weight:700;margin-bottom:3px}
.pop p{font-size:11px;color:#555;margin:2px 0}
.pop .pop-b{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:3px;color:#fff;display:inline-block;margin-bottom:5px}
.toast{position:fixed;bottom:16px;right:16px;background:#00A651;color:#fff;padding:8px 16px;border-radius:8px;font-weight:600;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
[class^="mk-"]{background:none!important;border:none!important}
@media(max-width:768px){.sb{width:100%;min-width:100%;height:40vh}#app{flex-direction:column}.map-wrap{height:60vh}}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app">
<div class="sb">
  <div class="sb-head">
    <div class="sb-title">🇫🇮 Finland Hypermarket Map</div>
    <div class="sb-count" id="cnt">Loading...</div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="search"><input id="q" placeholder="Search stores..." /></div>
  <div class="list" id="list"></div>
  <div class="add-panel">
    <button class="add-btn" id="addBtn">+ Add Store or Brand</button>
    <div class="form" id="form">
      <div class="tabs">
        <div class="tab on" data-t="s">Add Store</div>
        <div class="tab" data-t="b">New Brand</div>
      </div>
      <div id="ts">
        <div class="fg"><label class="fl">Brand</label><select class="fi" id="fBrand"></select></div>
        <div class="fg"><label class="fl">Store Name</label><input class="fi" id="fName"></div>
        <div class="fg"><label class="fl">Address</label><input class="fi" id="fAddr" placeholder="For geocoding"></div>
        <div class="fg"><label class="fl">City</label><input class="fi" id="fCity"></div>
        <div class="fg"><label class="fl">Comment (optional)</label><textarea class="fi" id="fNote" rows="2"></textarea></div>
        <div class="fg2">
          <div class="fg"><label class="fl">Lat</label><input class="fi" id="fLat"></div>
          <div class="fg"><label class="fl">Lng</label><input class="fi" id="fLng"></div>
        </div>
        <div class="fa"><button class="fb fb-p" id="geoBtn">📍 Geocode</button></div>
        <div class="fa"><button class="fb fb-p" id="saveBtn">Save Store</button><button class="fb fb-s" id="cancelBtn">Cancel</button></div>
        <div class="hint">💡 Click map or enter address + Geocode</div>
      </div>
      <div id="tb" style="display:none">
        <p class="note">Create a new store chain that isn't on the map yet</p>
        <div class="fg"><label class="fl">Brand Name</label><input class="fi" id="fBN"></div>
        <div class="fg"><label class="fl">Marker Letter</label><input class="fi" id="fBL" maxlength="2" style="width:50px"></div>
        <div class="fg"><label class="fl">Color</label><div class="colors" id="cpick"></div></div>
        <div class="fa"><button class="fb fb-p" id="saveBrand">Create Brand</button><button class="fb fb-s" id="cancelBrand">Cancel</button></div>
      </div>
    </div>
  </div>
</div>
<div class="map-wrap">
  <div id="map"></div>
</div>
<div class="toast" id="toast"></div>
</div>

function saveCustom() {
  const cStores = stores.filter(s => s.custom);
  const cBrands = {};
  for (const [k, b] of Object.entries(brands)) {
    if (!BRANDS[k]) cBrands[k] = b;
  }
  db.collection('mapdata').doc('shared').set({
    stores: cStores,
    brands: cBrands,
    updatedAt: new Date().toISOString()
  }).then(() => {
    showToast('✓ Saved ' + cStores.length + ' store' + (cStores.length !== 1 ? 's' : '') + ' — synced to all users');
  }).catch(e => {
    console.warn('Firebase save failed:', e);
    showToast('⚠ Save failed — check connection');
  });
}

async function loadCustom() {
  try {
    const doc = await db.collection('mapdata').doc('shared').get();
    if (doc.exists) {
      const d = doc.data();
      if (d.brands) {
        for (const [k, b] of Object.entries(d.brands)) {
          brands[k] = b;
          activeFilters.add(k);
        }
      }
      if (d.stores) {
        d.stores.forEach(s => { s.custom = true; stores.push(s); });
      }
    }
  } catch(e) {
    console.warn('Firebase load failed:', e);
  }
}

function listenForChanges() {
  db.collection('mapdata').doc('shared').onSnapshot(doc => {
    if (!doc.exists) return;
    const d = doc.data();
    // Remove old custom data
    stores = stores.filter(s => !s.custom);
    for (const k of Object.keys(brands)) {
      if (!BRANDS[k]) delete brands[k];
    }
    // Load new data
    if (d.brands) {
      for (const [k, b] of Object.entries(d.brands)) {
        brands[k] = b;
        activeFilters.add(k);
      }
    }
    if (d.stores) {
      d.stores.forEach(s => { s.custom = true; stores.push(s); });
    }
    // Re-render
    addAllMarkers();
    renderFilters();
    renderList();
    refreshBrandSelect();
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ════════════════════════════════════════════
// GEOCODING
// ════════════════════════════════════════════
function gcLoad() { try { return JSON.parse(localStorage.getItem(GC_KEY) || '{}'); } catch { return {}; } }
function gcSave(c) { try { localStorage.setItem(GC_KEY, JSON.stringify(c)); } catch {} }

async function geocode1(addr) {
  // Try geocode.maps.co first (works from GitHub Pages)
  try {
    const r = await fetch('https://geocode.maps.co/search?' + new URLSearchParams({
      q: addr + ', Finland', format: 'json', limit: '1'
    }));
    if (r.ok) {
      const d = await r.json();
      if (d && d.length) return { lat: +d[0].lat, lng: +d[0].lon };
    }
  } catch(e) {}
  // Fallback to Nominatim
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?' + new URLSearchParams({
      q: addr + ', Finland', format: 'json', limit: '1', countrycodes: 'fi'
    }), { headers: { 'User-Agent': 'FinlandStoreMap/1.0' } });
    if (r.ok) {
      const d = await r.json();
      if (d && d.length) return { lat: +d[0].lat, lng: +d[0].lon };
    }
  } catch(e) {}
  return null;
}

// ════════════════════════════════════════════
// MAP
// ════════════════════════════════════════════
const map = L.map('map', { zoomControl: false }).setView([63.5, 25.5], 6);
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps', maxZoom: 20
}).addTo(map);

function mkIcon(color, letter) {
  return L.divIcon({
    className: 'mk-' + letter + color.replace('#', ''),
    html: '<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="' + color + '" stroke="rgba(0,0,0,.4)" stroke-width="1.5"/><circle cx="14" cy="13" r="6" fill="white" opacity=".95"/><text x="14" y="16.5" text-anchor="middle" font-size="10" font-weight="700" font-family="sans-serif" fill="' + color + '">' + letter + '</text></svg>',
    iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -36]
  });
}

function addMarker(s, i) {
  if (!s.lat || !s.lng) return;
  const b = brands[s.b];
  if (!b) return;
  if (markers[i]) map.removeLayer(markers[i]);
  const m = L.marker([s.lat, s.lng], { icon: mkIcon(b.color, b.letter) }).addTo(map);
  m.bindPopup('<div class="pop"><span class="pop-b" style="background:' + b.color + '">' + b.name + '</span><h3>' + s.n + '</h3><p>📍 ' + s.a + '</p>' + (s.h ? '<p>🕐 ' + s.h + '</p>' : '') + '</div>');
  markers[i] = m;
  if (!activeFilters.has(s.b)) map.removeLayer(m);
}

function addAllMarkers() {
  markers = {};
  stores.forEach((s, i) => addMarker(s, i));
}

// ════════════════════════════════════════════
// UI
// ════════════════════════════════════════════
function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  for (const [k, b] of Object.entries(brands)) {
    const n = stores.filter(s => s.b === k).length;
    const on = activeFilters.has(k);
    const chip = document.createElement('div');
    chip.className = 'chip' + (on ? ' on' : '');
    if (on) chip.style.background = b.color;
    chip.style.setProperty('--cc', b.color);
    chip.innerHTML = '<span class="chip-dot" style="background:' + (on ? '#fff' : b.color) + '"></span>' + b.name + '<span class="chip-n">' + n + '</span>';
    chip.onclick = () => {
      if (activeFilters.has(k)) activeFilters.delete(k); else activeFilters.add(k);
      renderFilters();
      stores.forEach((s, i) => {
        if (!markers[i]) return;
        if (activeFilters.has(s.b)) { if (!map.hasLayer(markers[i])) map.addLayer(markers[i]); }
        else { if (map.hasLayer(markers[i])) map.removeLayer(markers[i]); }
      });
      renderList();
    };
    el.appendChild(chip);
  }
}

function renderList() {
  const el = document.getElementById('list');
  const q = document.getElementById('q').value.toLowerCase();
  let html = '', shown = 0;
  stores.forEach((s, i) => {
    if (!activeFilters.has(s.b)) return;
    const b = brands[s.b];
    if (!b) return;
    if (q && !s.n.toLowerCase().includes(q) && !s.c.toLowerCase().includes(q) && !b.name.toLowerCase().includes(q)) return;
    shown++;
    const dim = s.lat ? '' : 'opacity:.4;';
    html += '<div class="row" data-i="' + i + '" style="--rc:' + b.color + ';' + dim + '">' +
      '<span class="row-dot" style="background:' + b.color + '"></span>' +
      '<div class="row-info"><div class="row-name">' + s.n + '</div>' +
      '<div class="row-meta"><span class="row-tag" style="background:' + b.color + '">' + b.name + '</span>' +
      '<span>' + s.c + '</span>' +
      (s.h ? '<span class="row-hrs">' + s.h + '</span>' : '') +
      '</div></div>' +
      (s.custom ? '<button class="row-btn" data-edit="' + i + '" title="Edit">✎</button><button class="row-btn del" data-del="' + i + '" title="Delete">✕</button>' : '') +
      '</div>';
  });
  el.innerHTML = html;
  document.getElementById('cnt').textContent = stores.length + ' stores · ' + Object.keys(brands).length + ' brands · ' + shown + ' shown';

  // Click handlers
  el.querySelectorAll('.row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('.row-btn')) return;
      const i = +row.dataset.i;
      el.querySelectorAll('.row').forEach(r => r.classList.remove('act'));
      row.classList.add('act');
      if (markers[i]) {
        map.setView(markers[i].getLatLng(), 14, { animate: true });
        markers[i].openPopup();
      }
    });
  });

  el.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = +btn.dataset.edit;
      const s = stores[i];
      openForm();
      showTab('s');
      document.getElementById('fBrand').value = s.b;
      document.getElementById('fName').value = s.n;
      document.getElementById('fAddr').value = s.a || '';
      document.getElementById('fCity').value = s.c;
      document.getElementById('fNote').value = s.h || '';
      document.getElementById('fLat').value = s.lat || '';
      document.getElementById('fLng').value = s.lng || '';
      editIdx = i;
      const btn2 = document.getElementById('saveBtn');
      btn2.textContent = 'Update Store';
      btn2.classList.add('edit-mode');
    });
  });

  el.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = +btn.dataset.del;
      if (!confirm('Delete "' + stores[i].n + '"?')) return;
      if (markers[i]) map.removeLayer(markers[i]);
      stores.splice(i, 1);
      addAllMarkers();
      renderFilters();
      renderList();
      saveCustom();
    });
  });
}

function refreshBrandSelect() {
  const sel = document.getElementById('fBrand');
  sel.innerHTML = '';
  for (const [k, b] of Object.entries(brands)) {
    sel.innerHTML += '<option value="' + k + '">' + b.name + '</option>';
  }
}

function openForm() {
  formOpen = true;
  document.getElementById('form').classList.add('open');
  document.getElementById('addBtn').textContent = '✕ Close';
}

function closeForm() {
  formOpen = false;
  document.getElementById('form').classList.remove('open');
  document.getElementById('addBtn').textContent = '+ Add Store or Brand';
  editIdx = null;
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Save Store';
  btn.classList.remove('edit-mode');
  ['fName', 'fAddr', 'fCity', 'fNote', 'fLat', 'fLng'].forEach(id => document.getElementById(id).value = '');
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelector('[data-t="' + t + '"]').classList.add('on');
  document.getElementById('ts').style.display = t === 's' ? 'block' : 'none';
  document.getElementById('tb').style.display = t === 'b' ? 'block' : 'none';
}

// ════════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════════
document.getElementById('q').addEventListener('input', () => renderList());

document.getElementById('addBtn').addEventListener('click', () => {
  if (formOpen) { closeForm(); return; }
  openForm();
  showTab('s');
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => showTab(t.dataset.t));
});

// Color picker
const cpick = document.getElementById('cpick');
PALETTE.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'csw' + (i === 0 ? ' on' : '');
  el.style.background = c;
  el.onclick = () => {
    cpick.querySelectorAll('.csw').forEach(x => x.classList.remove('on'));
    el.classList.add('on');
    selColor = c;
  };
  cpick.appendChild(el);
});

// Geocode button
document.getElementById('geoBtn').addEventListener('click', async () => {
  const addr = document.getElementById('fAddr').value.trim();
  if (!addr) return alert('Enter an address first');
  const btn = document.getElementById('geoBtn');
  btn.textContent = '⏳ Geocoding...';
  btn.disabled = true;
  try {
    const r = await geocode1(addr);
    if (r) {
      document.getElementById('fLat').value = r.lat.toFixed(5);
      document.getElementById('fLng').value = r.lng.toFixed(5);
      btn.textContent = '✅ Found!';
    } else {
      btn.textContent = '❌ Not found - try clicking the map';
    }
  } catch (e) {
    btn.textContent = '❌ Error - try clicking the map';
  }
  btn.disabled = false;
  setTimeout(() => { btn.textContent = '📍 Geocode'; }, 2500);
});

// Save store
document.getElementById('saveBtn').addEventListener('click', () => {
  const bk = document.getElementById('fBrand').value;
  const nm = document.getElementById('fName').value.trim();
  const ad = document.getElementById('fAddr').value.trim();
  const ci = document.getElementById('fCity').value.trim();
  const nt = document.getElementById('fNote').value.trim();
  const la = parseFloat(document.getElementById('fLat').value);
  const ln = parseFloat(document.getElementById('fLng').value);

  if (!nm || !ci) return alert('Please fill in Store Name and City.');
  if (isNaN(la) || isNaN(ln)) return alert('Please set coordinates by clicking the map or using the Geocode button.');

  if (editIdx !== null) {
    // Update
    const s = stores[editIdx];
    s.n = nm; s.a = ad; s.c = ci; s.h = nt; s.lat = la; s.lng = ln; s.b = bk;
    if (markers[editIdx]) map.removeLayer(markers[editIdx]);
    addMarker(s, editIdx);
  } else {
    // Create
    const s = { n: nm, a: ad, c: ci, h: nt, lat: la, lng: ln, b: bk, custom: true };
    stores.push(s);
    addMarker(s, stores.length - 1);
  }

  renderFilters();
  renderList();
  closeForm();
  saveCustom();

  const idx = editIdx !== null ? editIdx : stores.length - 1;
  if (markers[idx]) {
    map.setView(markers[idx].getLatLng(), 14, { animate: true });
    markers[idx].openPopup();
  }
});

document.getElementById('cancelBtn').addEventListener('click', closeForm);
document.getElementById('cancelBrand').addEventListener('click', closeForm);

// Save brand
document.getElementById('saveBrand').addEventListener('click', () => {
  const name = document.getElementById('fBN').value.trim();
  const letter = document.getElementById('fBL').value.trim().toUpperCase() || (name ? name[0].toUpperCase() : '');

  if (!name) return alert('Please enter a brand name.');

  const key = name.toLowerCase().replace(/[^a-zäöå0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');

  if (brands[key]) {
    return alert('A brand called "' + brands[key].name + '" already exists.\n\nTo add a store under that brand, switch to the "Add Store" tab and select it from the Brand dropdown.');
  }

  brands[key] = { name: name, color: selColor, letter: letter };
  activeFilters.add(key);
  saveCustom();
  renderFilters();
  refreshBrandSelect();

  document.getElementById('fBN').value = '';
  document.getElementById('fBL').value = '';

  showToast('✓ Created brand "' + name + '"');
  showTab('s');
  document.getElementById('fBrand').value = key;
});

// Map click for coordinates
map.on('click', e => {
  if (formOpen) {
    document.getElementById('fLat').value = e.latlng.lat.toFixed(5);
    document.getElementById('fLng').value = e.latlng.lng.toFixed(5);
  }
});

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  await loadCustom();
  listenForChanges();

  // Load geocache
  const cache = gcLoad();
  let needGeo = 0;
  stores.forEach(s => {
    const key = s.n + '|' + s.a;
    if (cache[key]) {
      s.lat = cache[key].lat;
      s.lng = cache[key].lng;
    } else if (!s.lat) {
      needGeo++;
    }
  });

  renderFilters();
  renderList();
  refreshBrandSelect();
  addAllMarkers();

  // Background geocoding
  if (needGeo > 0) {
    showToast('⏳ Geocoding ' + needGeo + ' stores...');
    const toGeo = [];
    stores.forEach((s, i) => { if (!s.lat) toGeo.push(i); });

    for (let j = 0; j < toGeo.length; j++) {
      const s = stores[toGeo[j]];
      try {
        const r = await geocode1(s.a);
        if (r) {
          s.lat = r.lat;
          s.lng = r.lng;
          cache[s.n + '|' + s.a] = r;
          addMarker(s, toGeo[j]);
        }
      } catch (e) {}
      if (j % 10 === 0) { gcSave(cache); renderList(); }
      await new Promise(r => setTimeout(r, 1100));
    }
    gcSave(cache);
    renderList();
    showToast('✅ All stores geocoded!');
  }
}

init();


</script>
